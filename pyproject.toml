[tool.ruff]
line-length = 100
target-version = "py314"
extend-exclude = ["alembic/versions"]  # autogenerated migrations

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]  # Depends(...) in defaults is the standard FastAPI pattern

[tool.pytest.ini_options]
asyncio_mode = "auto"
